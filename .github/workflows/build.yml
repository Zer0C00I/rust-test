name: Build Packages

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            musl-tools \
            musl-dev \
            libfontconfig1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libssl-dev \
            dpkg-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-musl

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release (static musl)
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Create .deb package
        run: cargo deb --no-build --target x86_64-unknown-linux-musl

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: target/x86_64-unknown-linux-musl/debian/*.deb

      - name: Upload static binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-static-binary
          path: target/x86_64-unknown-linux-musl/release/slint-crm

  build-freebsd:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          prepare: |
            pkg install -y curl git pkgconf libxcb libxkbcommon wayland fontconfig
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          run: |
            . $HOME/.cargo/env
            cargo build --release

            mkdir -p pkg/usr/local/bin
            mkdir -p pkg/usr/local/share/applications
            cp target/release/slint-crm pkg/usr/local/bin/
            cp slint-crm.desktop pkg/usr/local/share/applications/

            VERSION=$(grep '^version' Cargo.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
            ARCH=$(uname -m)

            {
              echo "name: slint-crm"
              echo "version: \"${VERSION}\""
              echo "origin: local/slint-crm"
              echo "comment: CRM application built with Slint"
              echo "maintainer: maintainer@example.com"
              echo "www: https://github.com/Zer0C00I/slint-crm"
              echo "prefix: /usr/local"
              echo "desc: Customer relationship management application"
            } > +MANIFEST

            find pkg/usr/local -type f | sed 's|pkg/usr/local/||' > PLIST
            pkg create -M +MANIFEST -p PLIST -r pkg -o .

      - name: Upload FreeBSD package
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-package
          path: "*.pkg"
          if-no-files-found: ignore

  release:
    needs: [build-linux, build-freebsd]
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename static binary
        run: mv linux-static-binary/slint-crm linux-static-binary/slint-crm-linux-x86_64-static

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-package/*.deb
            freebsd-package/*.pkg
            linux-static-binary/slint-crm-linux-x86_64-static
          generate_release_notes: true
